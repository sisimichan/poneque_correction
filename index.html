<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엎기 자동화</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f3;--card:#fff;--border:#e5e5e3;--border2:#ccc;
  --t:#1a1a1a;--tm:#888;--td:#bbb;
  --surface:#fafafa;--surface2:#f0f0ee;
  --ink:#1a1a1a;--ink-inv:#fff;
  --green:#16a34a;--green-bg:#f0fdf4;--green-b:#86efac;
  --red:#dc2626;--red-bg:#fff1f1;--red-b:#fca5a5;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-b:#93c5fd;
  --amber-bg:#fffbeb;--amber-b:#fcd34d;--amber-t:#92400e;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
  --mono:'Courier New',monospace;
}
body{background:var(--bg);color:var(--t);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}

header{background:var(--card);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
header h1{font-size:15px;font-weight:700}
header .hsub{font-size:12px;color:var(--tm)}
.undo-hint{margin-left:auto;font-size:11px;color:var(--td);cursor:pointer;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:var(--surface);transition:all .15s;display:none}
.undo-hint:hover{border-color:var(--border2);color:var(--tm)}
.undo-hint.active{display:inline-flex;align-items:center;gap:5px}

.app{max-width:1360px;margin:0 auto;padding:24px 16px 80px;display:flex;gap:20px;align-items:flex-start}
.app-main{flex:1;min-width:0}

/* ── 사이드 미리보기 패널 ── */
.app-preview{width:360px;flex-shrink:0;position:sticky;top:60px}
.app-preview.hidden{display:none}
.preview-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.preview-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.preview-hdr-title{font-size:12px;font-weight:600;color:var(--tm);letter-spacing:.04em}
.preview-close-btn{background:none;border:none;color:var(--td);font-size:16px;cursor:pointer;padding:2px 4px;line-height:1;transition:color .15s}
.preview-close-btn:hover{color:var(--t)}
.preview-img-wrap{width:100%;aspect-ratio:3/4;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden}
.preview-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.preview-placeholder{color:var(--td);font-size:32px}
.preview-info{padding:10px 14px;border-top:1px solid var(--border)}
.preview-filename{font-family:var(--mono);font-size:10px;color:var(--tm);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preview-secname{font-size:12px;font-weight:600;color:var(--t);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preview-nav{display:flex;align-items:center;justify-content:space-between;gap:8px}
.preview-nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--t);font-size:18px;width:36px;height:32px;border-radius:7px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.preview-nav-btn:hover{background:var(--surface2);border-color:var(--border2)}
.preview-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.preview-counter{font-size:12px;color:var(--tm)}

/* ── 오렌지 미리보기 하이라이트 ── */
.gal-img.preview-active{outline:2px solid #f59e0b;outline-offset:1px;box-shadow:0 0 0 3px rgba(245,158,11,.25) !important}
.gal-img.preview-active .gal-num{background:#f59e0b}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:700;color:var(--tm);letter-spacing:.07em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}

textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--t);font-family:var(--mono);font-size:11.5px;padding:11px 13px;resize:vertical;outline:none;transition:border-color .15s;line-height:1.65}
textarea:focus{border-color:#555;background:var(--card)}
textarea::placeholder{color:var(--td)}
textarea[readonly]{cursor:default}

.btn{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border2);color:var(--t);font-family:var(--sans);font-size:13px;font-weight:500;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--ink);color:var(--ink-inv);border-color:var(--ink)}
.btn-primary:hover{background:#333;border-color:#333}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:var(--red-b)}
.btn-danger:hover{background:#fee2e2}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}

.step-lbl{font-size:11px;font-weight:700;color:var(--tm);letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.step-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.step-note{font-size:10px;color:var(--td);margin-left:2px;letter-spacing:0;text-transform:none;font-weight:400}

/* ── Section Card ── */
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:12px;transition:border-color .2s,box-shadow .2s}
.sec-card:hover{border-color:var(--border2);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sec-card.commented{opacity:.5}
.sec-card.dragging{opacity:.25;border-style:dashed}
/* Section drag drop indicator */
.sec-card.drop-before,.sec-card.drop-after{position:relative;z-index:1}
.sec-card.drop-before::before,.sec-card.drop-after::after{
  content:'';position:absolute;left:-4px;right:-4px;height:5px;
  background:var(--blue);border-radius:99px;z-index:20;
  box-shadow:0 0 0 3px var(--blue-bg),0 2px 10px rgba(37,99,235,.5);pointer-events:none;
}
.sec-card.drop-before::before{top:-7px}
.sec-card.drop-after::after{bottom:-7px}
.sec-card.drop-before,.sec-card.drop-after{outline:2px solid var(--blue-b);outline-offset:2px}

.sec-header{display:flex;align-items:flex-start;gap:12px;padding:13px 14px 13px 10px;cursor:pointer}
.drag-handle{display:flex;flex-direction:column;gap:3.5px;padding:5px 5px 0 1px;cursor:grab;flex-shrink:0;opacity:.25;transition:opacity .15s;user-select:none}
.drag-handle:hover{opacity:.6}
.drag-handle:active{cursor:grabbing}
.dd-row{display:flex;gap:3px}
.dd{width:3px;height:3px;border-radius:50%;background:var(--tm)}

.sec-thumb{width:108px;height:140px;border-radius:8px;overflow:hidden;background:var(--surface);flex-shrink:0;border:1px solid var(--border)}
.sec-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.no-img{display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:var(--td);font-size:26px}

.sec-info{flex:1;min-width:0;padding-top:2px}
.sec-name{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--t);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-meta-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tm);margin-bottom:10px}
.status-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px}
.status-badge.on{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.status-badge.off{background:var(--surface2);color:var(--tm);border:1px solid var(--border)}
.cmt-row{display:flex;align-items:center;gap:5px}
.cmt-lbl{font-family:var(--mono);font-size:11px;color:var(--td);flex-shrink:0}
.cmt-input{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--t);font-family:var(--sans);font-size:12px;padding:4px 8px;outline:none;transition:border-color .15s}
.cmt-input:focus{border-color:#555;background:var(--card)}
.cmt-input::placeholder{color:var(--td)}
.expand-arrow{font-size:9px;color:var(--td);transition:transform .2s;flex-shrink:0;margin-top:5px;user-select:none}
.expand-arrow.open{transform:rotate(90deg)}
.sec-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;padding-top:2px}
.toggle-btn{background:none;border:1px solid var(--border2);color:var(--tm);font-family:var(--sans);font-size:12px;font-weight:600;padding:6px 14px;border-radius:7px;cursor:pointer;transition:all .15s;white-space:nowrap}
.toggle-btn:hover{background:var(--surface2)}
.toggle-btn.is-on{border-color:var(--red-b);color:var(--red);background:var(--red-bg)}
.toggle-btn.is-off{border-color:var(--green-b);color:var(--green);background:var(--green-bg)}
.del-btn{background:none;border:1px solid var(--red-b);color:var(--red);font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer;transition:all .15s}
.del-btn:hover{background:var(--red-bg)}
/* 인트로 변환 버튼 */
.intro-toggle-btn{background:none;border:1px solid var(--blue-b);color:var(--blue);font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap}
.intro-toggle-btn:hover{background:var(--blue-bg)}
.intro-toggle-btn.is-intro{border-color:var(--amber-b);color:var(--amber-t);background:var(--amber-bg)}
.intro-toggle-btn.is-intro:hover{filter:brightness(.95)}
/* 코드 패널 */
.code-view-btn{background:none;border:none;color:var(--td);font-size:11px;font-family:var(--mono);padding:3px 7px;cursor:pointer;border-radius:5px;transition:all .15s;letter-spacing:.02em}
.code-view-btn:hover{color:var(--tm);background:var(--surface2)}
.code-view-btn.active{color:var(--blue);background:var(--blue-bg)}
.code-panel{display:none;border-top:1px solid var(--border);padding:10px 14px 12px;background:var(--surface)}
.code-panel.open{display:block}
.code-panel textarea{width:100%;font-family:var(--mono);font-size:11px;line-height:1.7;min-height:120px;resize:vertical;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--t);outline:none;transition:border-color .15s}
.code-panel textarea:focus{border-color:#555}
.code-edited-badge{font-size:10px;color:var(--amber-t);background:var(--amber-bg);border:1px solid var(--amber-b);padding:1px 7px;border-radius:99px;margin-left:6px}

/* ── Gallery ── */
.sec-gallery{display:none;border-top:1px solid var(--border);padding:12px 14px 14px;background:var(--surface)}
.sec-gallery.open{display:block}
.gallery-removed{display:none;margin-top:10px;padding:8px 12px;background:var(--amber-bg);border:1px solid var(--amber-b);border-radius:7px;font-size:12px;color:var(--amber-t);line-height:1.8}
/* toolbar at BOTTOM */
.gallery-toolbar{display:flex;align-items:center;gap:8px;margin-top:10px;padding:7px 10px;background:var(--blue-bg);border:1px solid var(--blue-b);border-radius:7px}
.sel-count{font-size:12px;font-weight:600;color:var(--blue);flex:1}
.gal-hint{font-size:11px;color:var(--tm);margin-bottom:8px}
.gallery-grid{display:flex;flex-wrap:wrap;gap:10px;user-select:none;padding:3px}
.gal-img{width:78px;height:98px;border-radius:6px;background:var(--card);border:2px solid var(--border);flex-shrink:0;position:relative;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.gal-img:hover{border-color:var(--border2)}
.gal-img.gal-selected{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue-b)}
.gal-img.gal-dragging-item{opacity:.3;border-style:dashed}
.gal-img.gal-invalid{border-color:var(--red) !important;box-shadow:0 0 0 1px var(--red-b) !important}
.gal-img.gal-invalid img{opacity:.35;filter:grayscale(.7)}
.gal-invalid-badge{position:absolute;top:3px;left:3px;background:var(--red);color:#fff;width:17px;height:17px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:6}
/* Gallery drop indicators */
.gal-img.gal-drop-before::before,.gal-img.gal-drop-after::after{
  content:'';position:absolute;top:-4px;bottom:-4px;width:5px;
  background:var(--blue);border-radius:99px;z-index:20;
  box-shadow:0 0 0 3px var(--blue-bg),0 2px 10px rgba(37,99,235,.5);pointer-events:none;
}
.gal-img.gal-drop-before::before{left:-8px}
.gal-img.gal-drop-after::after{right:-8px}
.gal-img img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;border-radius:4px}
.gal-num{position:absolute;bottom:3px;left:4px;background:rgba(0,0,0,.55);color:#fff;font-size:9px;font-family:var(--mono);padding:1px 5px;border-radius:3px;pointer-events:none;z-index:5}
.gal-check{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:99px;background:var(--blue);color:#fff;font-size:10px;display:none;align-items:center;justify-content:center;font-weight:700;pointer-events:none}
.gal-img.gal-selected .gal-check{display:flex}

/* ── Add Zone ── */
.add-zone{padding:4px 0}
.add-zone-inner{display:flex;align-items:center;gap:8px}
.add-line{flex:1;height:1px;background:var(--border)}
.add-btn-inline{background:none;border:1px dashed var(--border2);color:var(--tm);font-size:11px;font-family:var(--sans);font-weight:500;padding:3px 14px;border-radius:5px;cursor:pointer;transition:all .15s}
.add-btn-inline:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.add-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-top:4px}
.add-field-row{display:flex;gap:12px;margin-bottom:12px}
.add-field{display:flex;flex-direction:column;gap:4px;flex:1}
.add-field.short{max-width:160px;flex:0 0 160px}
.add-field label{font-size:12px;color:var(--tm);font-weight:500}
.add-field input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface);color:var(--t);outline:none;font-family:var(--sans);transition:border-color .15s}
.add-field input:focus{border-color:#555;background:var(--card)}
.add-field input::placeholder{color:var(--td)}
.add-field .hint{font-size:11px;color:var(--td);margin-top:2px}
.add-form-btns{display:flex;gap:8px;border-top:1px solid var(--surface2);padding-top:12px;margin-top:4px}

/* ── Generate ── */
.gen-btn{width:100%;padding:11px;background:var(--ink);color:var(--ink-inv);border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;letter-spacing:.02em;font-family:var(--sans)}
.gen-btn:hover{background:#333}
.gen-btn:disabled{background:#999;cursor:not-allowed}
.progress-wrap{display:none;background:#e5e5e3;border-radius:99px;height:6px;overflow:hidden;margin-top:12px}
.progress-bar{height:100%;background:var(--ink);border-radius:99px;width:0%;transition:width .15s}
.progress-label{display:none;font-size:11px;color:var(--tm);margin-top:5px;text-align:center}
.filter-result{display:none;margin-top:12px;padding:10px 14px;border-radius:8px;font-size:12px;line-height:1.9}
.filter-result.ok{background:var(--green-bg);border:1px solid var(--green-b);color:var(--green)}
.filter-result.warn{background:var(--amber-bg);border:1px solid var(--amber-b);color:var(--amber-t)}
.filter-result.err{background:var(--red-bg);border:1px solid var(--red-b);color:var(--red)}
.copy-btn{width:100%;margin-top:10px;padding:10px;background:var(--card);color:var(--t);border:1px solid var(--border2);border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--sans)}
.copy-btn:hover{border-color:#555;background:var(--surface2)}
.copy-btn.copied{background:var(--green-bg);border-color:var(--green-b);color:var(--green)}
.out-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.out-meta{font-size:12px;color:var(--tm)}

/* ── Lightbox ── */
.lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:10000;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .18s;pointer-events:none}
.lb-overlay.show{opacity:1;pointer-events:all}
.lb-img{max-width:92vw;max-height:88vh;border-radius:6px;object-fit:contain;transform:scale(.94);transition:transform .18s;box-shadow:0 8px 40px rgba(0,0,0,.5);user-select:none}
.lb-overlay.show .lb-img{transform:scale(1)}
.lb-close{position:fixed;top:18px;right:22px;color:#fff;font-size:26px;cursor:pointer;opacity:.7;transition:opacity .15s;background:none;border:none;line-height:1;padding:4px 8px}
.lb-close:hover{opacity:1}
.lb-nav{position:fixed;top:50%;transform:translateY(-50%);color:#fff;font-size:32px;cursor:pointer;opacity:.5;transition:opacity .15s;background:none;border:none;padding:8px 14px;line-height:1;user-select:none}
.lb-nav:hover{opacity:1}
.lb-prev{left:12px}
.lb-next{right:12px}
.lb-info{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);font-size:12px;font-family:var(--mono);white-space:nowrap}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--ink-inv);font-size:13px;font-weight:500;padding:9px 20px;border-radius:8px;opacity:0;transition:all .22s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}


</style>
</head>
<body>

<header>
  <h1>엎기 자동화</h1>
  <span class="hsub">· 파일명 기반 섹션 감지 · 블록 주석 처리 · 이미지 검증</span>
  <div id="undo-hint" class="undo-hint" onclick="doUndo()">↩ 되돌리기 (Ctrl+Z)</div>
</header>

<div class="app">
<div class="app-main">

  <div class="card">
    <div class="card-title">01 · HTML 붙여넣기</div>
    <textarea id="raw-input" rows="8"
      placeholder="상품 상세 HTML 전체를 붙여넣으세요&#10;&#10;· 파일명 패턴으로 섹션 자동 감지&#10;· 통 블록 주석 → 주석됨 상태로 자동 인식&#10;· 인트로/디테일 이미지 자동 인식"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="parseInput()">섹션 분석</button>
      <button class="btn" onclick="resetAll()">초기화</button>
    </div>
  </div>

  <div id="sections-wrap" style="display:none">
    <div class="step-lbl">
      02 · 섹션 편집
      <span class="step-note">카드 클릭 → 이미지 · 핸들 드래그 → 순서 변경</span>
    </div>
    <div id="sections-list"></div>
  </div>

  <div id="gen-wrap" style="display:none">
    <button class="gen-btn" id="gen-btn" onclick="generateFinal()">HTML 생성</button>
    <div class="progress-wrap" id="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="progress-label" id="progress-label"></div>
    <div class="filter-result" id="filter-result"></div>
    <div class="card" id="output-wrap" style="display:none;margin-top:16px">
      <div class="card-title">생성된 HTML</div>
      <div class="out-bar">
        <span class="out-meta" id="out-meta"></span>
      </div>
      <textarea id="out-html" rows="12" readonly onclick="this.select()"></textarea>
      <button class="copy-btn" id="copy-btn" onclick="copyOutput()">클립보드에 복사</button>
    </div>
  </div>

</div><!-- /app-main -->

<!-- ── 사이드 미리보기 패널 ── -->
<div class="app-preview hidden" id="app-preview">
  <div class="preview-panel">
    <div class="preview-hdr">
      <span class="preview-hdr-title">미리보기</span>
      <button class="preview-close-btn" onclick="previewClose()">✕</button>
    </div>
    <div class="preview-img-wrap" id="preview-img-wrap">
      <div class="preview-placeholder">🖼</div>
    </div>
    <div class="preview-info">
      <div class="preview-filename" id="preview-filename">—</div>
      <div class="preview-secname" id="preview-secname">—</div>
      <div class="preview-nav">
        <button class="preview-nav-btn" id="preview-prev" onclick="previewMove(-1)">‹</button>
        <span class="preview-counter" id="preview-counter">— / —</span>
        <button class="preview-nav-btn" id="preview-next" onclick="previewMove(1)">›</button>
        <button class="preview-nav-btn" id="preview-del" onclick="previewDelete()" title="이미지 삭제" style="margin-left:4px;color:var(--red);border-color:var(--red-b)">🗑</button>
      </div>
    </div>
  </div>
</div>

<div class="lb-overlay" id="lb-overlay" onclick="lbClose()">
  <button class="lb-close" onclick="lbClose()">✕</button>
  <button class="lb-nav lb-prev" onclick="lbMove(-1,event)">‹</button>
  <img class="lb-img" id="lb-img" src="" onclick="event.stopPropagation()">
  <button class="lb-nav lb-next" onclick="lbMove(1,event)">›</button>
  <div class="lb-info" id="lb-info"></div>
</div>
<div id="toast" class="toast"></div>

<script>
// ═══════════════════════════════════════════
//  State
// ═══════════════════════════════════════════
let headerHtml = '', footerHtml = '';
let sections   = [];   // [{id, name, headerComment, images:[{src}], commented, selected:Set, isDetail?}]

const openSections = new Set();  // section IDs that are gallery-open
let cardDragSrcIdx = null;
let galDragPayload = null;
let lastClickedImg = null;

// preview
let previewState = null; // {secIdx, idx, wrap}
const secRawCode = new Map(); // secId → user-edited HTML override
const INTRO_RE = /써머리|intro|summary/i;
const isIntroSec = sec => !!(sec.isIntro || INTRO_RE.test(sec.headerComment || sec.name));

// ═══════════════════════════════════════════
//  Undo — preserves gallery open state
// ═══════════════════════════════════════════
const undoStack = [];
const MAX_UNDO = 30;

function pushUndo(label) {
  undoStack.push({
    label,
    snap: sections.map(s => ({
      ...s,
      images: s.images.map(img => ({ ...img })),
      selected: new Set(s.selected),
    })),
    openSnap: new Set(openSections),
  });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  refreshUndoHint();
}

function doUndo() {
  if (!undoStack.length) { toast('되돌릴 작업이 없어요'); return; }
  const { snap, label, openSnap } = undoStack.pop();
  sections = snap;
  if (openSnap) { openSections.clear(); openSnap.forEach(id => openSections.add(id)); }
  lastClickedImg = null;
  renderAll();
  refreshUndoHint();
  toast(`↩ 되돌림: ${label}`);
}

function refreshUndoHint() {
  const el = document.getElementById('undo-hint');
  if (undoStack.length) {
    el.classList.add('active');
    el.textContent = `↩ ${undoStack[undoStack.length-1].label} 되돌리기`;
  } else {
    el.classList.remove('active');
  }
}

document.addEventListener('keydown', e => {
  const typing = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName);
  const lbShown = document.getElementById('lb-overlay')?.classList.contains('show');
  if (lbShown) {
    if (e.key === 'Escape')           lbClose();
    else if (e.key === 'ArrowRight')  { lbIdx = (lbIdx+1) % lbUrls.length; lbShow(); }
    else if (e.key === 'ArrowLeft')   { lbIdx = (lbIdx-1+lbUrls.length) % lbUrls.length; lbShow(); }
    return;
  }
  // Preview panel keyboard navigation
  if (previewState && !typing) {
    if (e.key === 'ArrowRight') { previewMove(1);  e.preventDefault(); return; }
    if (e.key === 'ArrowLeft')  { previewMove(-1); e.preventDefault(); return; }
    if (e.key === 'Escape')     { previewClose();  e.preventDefault(); return; }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (typing) return;
    e.preventDefault(); doUndo();
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') && !typing) {
    const hasSel = sections.some(s => s.selected?.size && openSections.has(s.id));
    if (!hasSel) return;
    e.preventDefault();
    sections.forEach((sec, si) => {
      if (!sec.selected?.size || !openSections.has(sec.id)) return;
      pushUndo(`이미지 ${sec.selected.size}장 삭제`);
      const ids = [...sec.selected];
      sec.images = sec.images.filter((_, k) => !ids.includes(k));
      sec.selected.clear();
      refreshGallery(document.querySelectorAll('.sec-card')[si], si);
      toast(`${ids.length}장 삭제됨`);
    });
  }
});

// ═══════════════════════════════════════════
//  Utils
// ═══════════════════════════════════════════
const uid  = () => Math.random().toString(36).slice(2,8);
const escQ = s => (s||'').replace(/"/g,'&quot;');
const escH = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
let _toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.classList.remove('show'), 2500);
}
function formatDate(val) {
  const c = val.trim().replace(/\D/g,'');
  if (c.length===6) return `20${c.slice(0,2)}/${c.slice(2,4)}/${c.slice(4,6)}`;
  if (c.length===8) return `${c.slice(0,4)}/${c.slice(4,6)}/${c.slice(6,8)}`;
  return val;
}

// ═══════════════════════════════════════════
//  Lightbox
// ═══════════════════════════════════════════
let lbUrls = [], lbIdx = 0;
function lbOpen(urls, idx) {
  lbUrls = urls; lbIdx = idx; lbShow();
  document.getElementById('lb-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function lbShow() {
  const url = lbUrls[lbIdx];
  document.getElementById('lb-img').src = url;
  document.getElementById('lb-info').textContent =
    `${lbIdx+1} / ${lbUrls.length}  ·  ${url.split('/').pop()}`;
}
function lbClose() {
  document.getElementById('lb-overlay').classList.remove('show');
  document.body.style.overflow = '';
  setTimeout(() => { document.getElementById('lb-img').src = ''; }, 200);
}
function lbMove(dir, e) {
  e.stopPropagation();
  lbIdx = (lbIdx + dir + lbUrls.length) % lbUrls.length;
  lbShow();
}

// ═══════════════════════════════════════════
//  사이드 미리보기
// ═══════════════════════════════════════════
function previewOpen(secIdx, imgIdx, wrap) {
  previewState = { secIdx, idx: imgIdx, wrap };
  document.getElementById('app-preview').classList.remove('hidden');
  previewRender();
}

function previewDelete() {
  if (!previewState) return;
  const { secIdx, idx, wrap } = previewState;
  const sec = sections[secIdx];
  if (!sec || !sec.images.length) return;

  pushUndo(`이미지 삭제 (미리보기)`);
  sec.images.splice(idx, 1);
  if (sec.selected) {
    // Rebuild selection indices — shift down any index above deleted one
    const newSel = new Set();
    sec.selected.forEach(k => { if (k < idx) newSel.add(k); else if (k > idx) newSel.add(k - 1); });
    sec.selected = newSel;
  }

  // Refresh gallery thumbnail + grid
  const card = document.querySelectorAll('.sec-card')[secIdx];
  if (card) refreshGallery(card, secIdx);

  if (!sec.images.length) {
    // No images left — close preview
    previewClose();
    toast('이미지 삭제됨 (섹션 비어있음)');
    return;
  }

  // Move to same index, or step back if we deleted the last
  previewState.idx = Math.min(idx, sec.images.length - 1);
  previewRender();
  toast(`이미지 삭제됨 (Ctrl+Z)`);
}

function previewClose() {
  if (previewState?.wrap) {
    previewState.wrap.querySelectorAll('.gal-img.preview-active')
      .forEach(el => el.classList.remove('preview-active'));
  }
  previewState = null;
  document.getElementById('app-preview').classList.add('hidden');
  document.getElementById('preview-img-wrap').innerHTML = '<div class="preview-placeholder">🖼</div>';
}

function previewMove(dir) {
  if (!previewState) return;
  const sec = sections[previewState.secIdx];
  if (!sec) return;
  const len = sec.images.length;
  previewState.idx = (previewState.idx + dir + len) % len;
  previewRender();
}

function previewRender() {
  if (!previewState) return;
  const sec = sections[previewState.secIdx];
  if (!sec) return;
  const { idx, wrap } = previewState;
  const img = sec.images[idx];
  if (!img) return;
  const url = img.src;

  // Sync orange highlight in gallery
  if (wrap) {
    wrap.querySelectorAll('.gal-img').forEach(el => {
      el.classList.toggle('preview-active', +el.dataset.img === idx);
    });
  }

  // Load image
  const imgWrap = document.getElementById('preview-img-wrap');
  imgWrap.innerHTML = '<div class="preview-placeholder" style="font-size:20px">⏳</div>';
  const loadImg = new Image();
  const snapIdx = idx;
  loadImg.onload = () => {
    if (!previewState || previewState.idx !== snapIdx) return;
    imgWrap.innerHTML = `<img src="${escQ(url)}" alt="">`;
  };
  loadImg.onerror = () => {
    imgWrap.innerHTML = '<div class="preview-placeholder">📷</div>';
  };
  loadImg.src = url;

  document.getElementById('preview-filename').textContent = url.split('/').pop();
  document.getElementById('preview-secname').textContent  = sec.headerComment || sec.name;
  document.getElementById('preview-counter').textContent  = `${idx + 1} / ${sec.images.length}`;
  document.getElementById('preview-prev').disabled = sec.images.length <= 1;
  document.getElementById('preview-next').disabled = sec.images.length <= 1;
  document.getElementById('preview-del').disabled  = false;
}

// ═══════════════════════════════════════════
//  Image checker (with cache)
// ═══════════════════════════════════════════
const imgCache = new Map();
function checkImg(url) {
  if (imgCache.has(url)) return Promise.resolve(imgCache.get(url));
  return new Promise(resolve => {
    const img = new Image();
    const t = setTimeout(() => { imgCache.set(url, false); resolve(false); }, 8000);
    img.onload  = () => { clearTimeout(t); imgCache.set(url, true);  resolve(true); };
    img.onerror = () => { clearTimeout(t); imgCache.set(url, false); resolve(false); };
    img.src = url;
  });
}

// ═══════════════════════════════════════════
//  Filename helpers
// ═══════════════════════════════════════════
function extractBase(src) {
  // Strip extension, then strip trailing (_숫자_?)+ patterns
  // "260401_ljh_PT_0012_charcoal_slv_sora_1" → "260401_ljh_PT_0012_charcoal_slv_sora"
  // "260401_ljh_TOP_0048_red_PT_0012_black_25_" → "260401_ljh_TOP_0048_red_PT_0012_black"
  // "TOP0070_intro" → "TOP0070_intro" (no numeric suffix → keep as-is)
  // "PT_0012" → "PT_0012" (no numeric suffix)
  // "IMG_1944" → null (stray — base too short/simple)
  const fname = src.split('/').pop().replace(/\.\w+$/, '');
  const stripped = fname.replace(/(?:_\d+_?)+$/, '');
  if (!stripped.includes('_') && stripped.length < 6) return null;
  return stripped;
}

function parseCodename(raw) {
  const m = raw.trim().match(/^(.+?)_(\d+)_?$/);
  if (m) return { base: m[1], maxNum: parseInt(m[2]) };
  return { base: raw.trim(), maxNum: null };
}

const BASE_URL = 'http://kclubcokr.cafe24.com/web/poneque/';
function buildAddImages(date, codename) {
  const { base, maxNum } = parseCodename(codename);
  if (!maxNum) return [{ src: `${BASE_URL}${date}/${codename}.jpg` }];
  return Array.from({ length: maxNum }, (_, i) => ({
    src: `${BASE_URL}${date}/${base}_${i+1}.jpg`,
  }));
}

// ═══════════════════════════════════════════
//  Tokenizer / Parser
// ═══════════════════════════════════════════
function tokenize(html) {
  const tokens = [];
  let i = 0;
  while (i < html.length) {
    if (html.startsWith('<!--', i)) {
      const end = html.indexOf('-->', i+4);
      if (end === -1) { i++; continue; }
      const content = html.slice(i+4, end);
      const imgSrcs = [];
      const re = /src="([^"]+\.(?:jpg|jpeg|png|gif|webp)[^"]*)"/gi;
      let m2;
      while ((m2 = re.exec(content)) !== null) imgSrcs.push(m2[1]);
      if (imgSrcs.length > 0) {
        tokens.push({ type:'block_comment', srcs:imgSrcs, start:i });
      } else {
        const t = content.trim();
        if (t && t.length < 120 && !/^-/.test(t))
          tokens.push({ type:'comment', text:t, start:i });
      }
      i = end + 3; continue;
    }
    if (html.startsWith('<p style="text-align: center;"><img src="', i)) {
      const m = html.slice(i).match(/^<p style="text-align: center;"><img src="([^"]+)"><\/p>/);
      if (m) { tokens.push({ type:'img', src:m[1], start:i }); i += m[0].length; continue; }
    }
    i++;
  }
  return tokens;
}

function parseInput() {
  const raw = document.getElementById('raw-input').value;
  if (!raw.trim()) { toast('HTML을 붙여넣어 주세요'); return; }

  // ── Footer boundary ──
  const footerRe = /<!--\s*디테일\s*-->|<!-{1,4}\s*스냅핏|sf_chart_iframe/i;
  const fMatch = raw.match(footerRe);
  const footerStart = fMatch ? fMatch.index : raw.length;
  const body = raw.slice(0, footerStart);
  footerHtml = raw.slice(footerStart);

  // ── Extract detail image from footer ──
  let detailSec = null;
  const detailImgRe = /<p style="text-align: center;"><img src="([^"]+)"><\/p>/;
  const detailM = footerHtml.match(detailImgRe);
  if (detailM) {
    const dsrc = detailM[1];
    const dbase = extractBase(dsrc) || dsrc.split('/').pop().replace(/\.\w+$/,'');
    detailSec = { id:uid(), name:dbase, headerComment:'디테일',
      images:[{src:dsrc}], commented:false, selected:new Set(), isDetail:true };
    footerHtml = footerHtml.replace(detailM[0], '').replace(/\s*<br>\s*(<br>\s*){3}<br>\s*/,'');
  }

  // ── Tokenize body ──
  const tokens = tokenize(body);

  // ── Find where sections begin ──
  // First image or block_comment token index
  let firstImgIdx = -1;
  for (let k = 0; k < tokens.length; k++) {
    if (tokens[k].type === 'img' || tokens[k].type === 'block_comment') {
      firstImgIdx = k; break;
    }
  }
  if (firstImgIdx === -1 && !detailSec) { toast('이미지 섹션을 찾을 수 없어요'); return; }

  // The comment immediately before the first image starts the first section.
  // Any comments before that stay in headerHtml.
  let sectionStartIdx = firstImgIdx;
  if (firstImgIdx > 0 && tokens[firstImgIdx - 1]?.type === 'comment') {
    sectionStartIdx = firstImgIdx - 1;
  }

  const hEnd = sectionStartIdx >= 0 ? tokens[sectionStartIdx].start : body.length;
  headerHtml = body.slice(0, hEnd);

  // ── Build sections (COMMENT-DRIVEN) ──
  // Rule: a comment token immediately starts a new section.
  // All images until the next comment belong to that section.
  sections = [];
  openSections.clear();
  let cur = null;

  if (sectionStartIdx >= 0) {
    for (let ti = sectionStartIdx; ti < tokens.length; ti++) {
      const tok = tokens[ti];

      if (tok.type === 'comment') {
        // Flush current section
        if (cur) sections.push(cur);
        // Start new named section immediately
        cur = { id:uid(), name:tok.text, headerComment:tok.text,
          images:[], commented:false, selected:new Set() };
        continue;
      }

      if (tok.type === 'block_comment') {
        // Entire block-commented section (already commented-out 엎기)
        if (cur) { sections.push(cur); cur = null; }
        const firstName = extractBase(tok.srcs[0]) || tok.srcs[0].split('/').pop().replace(/\.\w+$/,'');
        sections.push({ id:uid(), name:firstName, headerComment:firstName,
          images:tok.srcs.map(src=>({src})), commented:true, selected:new Set() });
        continue;
      }

      if (tok.type === 'img') {
        if (!cur) {
          // Orphan image before any comment — create unnamed section by filename
          const base = extractBase(tok.src) || tok.src.split('/').pop().replace(/\.\w+$/,'');
          cur = { id:uid(), name:base, headerComment:base,
            images:[], commented:false, selected:new Set() };
        }
        cur.images.push({ src: tok.src });
      }
    }
    if (cur) sections.push(cur);
  }

  // Filter out empty sections
  sections = sections.filter(s => s.images.length > 0);

  // Append detail as final section
  if (detailSec) sections.push(detailSec);

  if (!sections.length) { toast('섹션을 찾을 수 없어요'); return; }

  undoStack.length = 0; refreshUndoHint(); lastClickedImg = null;
  renderAll();
  document.getElementById('sections-wrap').style.display = '';
  document.getElementById('gen-wrap').style.display = '';
  document.getElementById('output-wrap').style.display = 'none';
  toast(`${sections.length}개 섹션 감지됨`);
}

// ═══════════════════════════════════════════
//  Render all
// ═══════════════════════════════════════════
function renderAll() {
  const list = document.getElementById('sections-list');
  list.innerHTML = '';
  list.appendChild(makeAddZone(0));
  sections.forEach((sec, i) => {
    const card = makeSectionCard(sec, i);
    if (openSections.has(sec.id)) {
      card.querySelector('.sec-gallery').classList.add('open');
      card.querySelector('[data-arrow]').classList.add('open');
    }
    list.appendChild(card);
    list.appendChild(makeAddZone(i+1));
  });
}

// ═══════════════════════════════════════════
//  Section Card
// ═══════════════════════════════════════════

      </div>
      <div class="sec-thumb">
        ${thumb
          ? `<img src="${escQ(thumb)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'>📷</div>'">`

          ${secRawCode.has(sec.id) ? '<span class="code-edited-badge">수정됨</span>' : ''}
        </div>
        <div class="cmt-row">
          <span class="cmt-lbl">&lt;!--</span>
          <input class="cmt-input" type="text" value="${escH(sec.headerComment||'')}"
            placeholder="착장 이름" data-idx="${i}">
          <span class="cmt-lbl">--&gt;</span>
        </div>
      </div>
      <div class="expand-arrow" data-arrow>▶</div>
      <div class="sec-actions">
        <button class="toggle-btn ${sec.commented?'is-off':'is-on'}" data-toggle="${i}">
          ${sec.commented?'활성화':'주석'}
        </button>
        <button class="intro-toggle-btn ${isIntro?'is-intro':''}" data-intro-toggle="${i}">
          ${isIntro?'인트로 해제':'인트로 변환'}
        </button>
        <button class="del-btn" data-del="${i}">삭제</button>
      </div>
    </div>
    <div class="sec-gallery">

        <button class="code-view-btn" data-code-btn title="HTML 코드 보기/수정">&lt;/&gt;</button>
      </div>
      <div class="gallery-grid">
        ${buildGalleryHTML(sec.images, i)}
      </div>
      <div class="gallery-toolbar" style="display:none">
        <span class="sel-count">0개 선택됨</span>
        <button class="btn btn-sm btn-danger" data-galdel="${i}">선택 삭제</button>
        <button class="btn btn-sm" data-galclear="${i}">선택 해제</button>
      </div>
      <div class="code-panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:11px;color:var(--tm)">이 섹션의 HTML 코드를 직접 수정할 수 있습니다. 수정하면 HTML 생성 시 이 코드가 그대로 사용됩니다.</span>
          <button class="btn btn-sm code-reset-btn" style="font-size:11px;flex-shrink:0;margin-left:8px">초기화</button>
        </div>
        <textarea class="code-textarea" placeholder="여기에 직접 HTML을 입력하거나, 섹션 편집 후 자동 생성된 코드를 확인할 수 있어요."></textarea>
      </div>
    </div>`;

  const header  = wrap.querySelector('.sec-header');
  const gallery = wrap.querySelector('.sec-gallery');
  const arrow   = wrap.querySelector('[data-arrow]');
  const dragH   = wrap.querySelector('.drag-handle');
  const cmtIn   = wrap.querySelector('.cmt-input');
  const toggleB = wrap.querySelector('[data-toggle]');
  const delB    = wrap.querySelector('[data-del]');
  const galDelB = wrap.querySelector('[data-galdel]');
  const galClrB = wrap.querySelector('[data-galclear]');
  const introToggleB = wrap.querySelector('[data-intro-toggle]');
  const codeBtn  = wrap.querySelector('[data-code-btn]');
  const codePanel= wrap.querySelector('.code-panel');
  const codeTa   = wrap.querySelector('.code-textarea');
  const resetBtn = wrap.querySelector('.code-reset-btn');

  header.addEventListener('click', e => {
    if ([dragH,toggleB,delB,cmtIn,galDelB,galClrB,introToggleB,codeBtn,resetBtn].some(el=>el&&el.contains(e.target))) return;
    const open = gallery.classList.toggle('open');
    arrow.classList.toggle('open', open);
    if (open) openSections.add(sec.id); else {
      openSections.delete(sec.id);
      if (previewState?.secIdx === i) previewClose();
    }
  });

  cmtIn.addEventListener('focus', e => { e.target.dataset.prev = e.target.value; });
  cmtIn.addEventListener('change', e => {
    const idx = +e.target.dataset.idx;
    const newVal = e.target.value.trim() || null;
    if (newVal !== sections[idx]?.headerComment) pushUndo('착장 이름 변경');
    if (sections[idx]) sections[idx].headerComment = newVal;
  });

  toggleB.addEventListener('click', () => {
    pushUndo(sec.commented ? '섹션 활성화' : '섹션 주석');
    sec.commented = !sec.commented;
    wrap.classList.toggle('commented', sec.commented);
    const badge = wrap.querySelector('.status-badge');
    badge.className = `status-badge ${sec.commented?'off':'on'}`;
    badge.textContent = sec.commented ? '주석됨' : '활성화';
    toggleB.className = `toggle-btn ${sec.commented?'is-off':'is-on'}`;
    toggleB.textContent = sec.commented ? '활성화' : '주석';
    toast(sec.commented ? `주석: ${sec.name}` : `활성화: ${sec.name}`);
  });

  delB.addEventListener('click', () => {
    pushUndo(`섹션 삭제: ${sec.name}`);
    openSections.delete(sec.id);
    if (previewState?.secIdx === i) previewClose();
    sections.splice(i, 1);
    renderAll();
    toast(`섹션 삭제됨: ${sec.name} (Ctrl+Z)`);
  });

  // 인트로 변환 토글
  introToggleB.addEventListener('click', () => {
    pushUndo(sec.isIntro ? '인트로 해제' : '인트로 변환');
    sec.isIntro = !sec.isIntro;
    introToggleB.className = `intro-toggle-btn${sec.isIntro?' is-intro':''}`;
    introToggleB.textContent = sec.isIntro ? '인트로 해제' : '인트로 변환';
    // Refresh badge
    const metaRow = wrap.querySelector('.sec-meta-row');
    const existing = metaRow.querySelector('.intro-badge-dyn');
    if (sec.isIntro && !existing) {
      const badge = document.createElement('span');
      badge.className = 'code-edited-badge intro-badge-dyn';
      badge.style.cssText = 'background:var(--amber-bg);color:var(--amber-t);border-color:var(--amber-b)';
      badge.textContent = '인트로';
      metaRow.appendChild(badge);
    } else if (!sec.isIntro && existing) {
      existing.remove();
    }
    toast(sec.isIntro ? '인트로 섹션으로 변환됨' : '일반 섹션으로 변환됨');
  });

  // 코드 패널
  codeBtn.addEventListener('click', e => {
    e.stopPropagation();
    const open = codePanel.classList.toggle('open');
    codeBtn.classList.toggle('active', open);
    if (open) {
      codeTa.value = secRawCode.get(sec.id) || buildSectionPreview(sec);
    }
  });
  codeTa.addEventListener('input', () => {
    secRawCode.set(sec.id, codeTa.value);
    let badge = wrap.querySelector('.code-override-badge');
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'code-edited-badge code-override-badge';
      badge.textContent = '수정됨';
      wrap.querySelector('.sec-meta-row').appendChild(badge);
    }
  });
  resetBtn.addEventListener('click', e => {
    e.stopPropagation();
    secRawCode.delete(sec.id);
    codeTa.value = buildSectionPreview(sec);
    const badge = wrap.querySelector('.code-override-badge');
    if (badge) badge.remove();
    toast('코드 초기화됨');
  });
  // 이미 수정됨 배지 복원
  if (secRawCode.has(sec.id)) {
    const badge = document.createElement('span');
    badge.className = 'code-edited-badge code-override-badge';
    badge.textContent = '수정됨';
    wrap.querySelector('.sec-meta-row').appendChild(badge);
  }

  galDelB.addEventListener('click', () => deleteSelectedImages(wrap, i));
  galClrB.addEventListener('click', () => clearGalSelection(wrap, i));

  bindGalleryEvents(wrap, i);

  // Card-level drag
  wrap.draggable = false;
  dragH.addEventListener('mousedown', () => { wrap.draggable = true; });
  wrap.addEventListener('mouseup',    () => { wrap.draggable = false; });
  wrap.addEventListener('mouseleave', () => { if (!galDragPayload) wrap.draggable = false; });

  wrap.addEventListener('dragstart', e => {
    cardDragSrcIdx = i;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(i));
    setTimeout(() => wrap.classList.add('dragging'), 0);
  });
  wrap.addEventListener('dragend', () => {
    wrap.classList.remove('dragging');
    wrap.draggable = false;
    document.querySelectorAll('.sec-card.drop-before,.sec-card.drop-after')
      .forEach(el => el.classList.remove('drop-before','drop-after'));
  });
  wrap.addEventListener('dragover', e => {
    if (galDragPayload || cardDragSrcIdx === null || cardDragSrcIdx === i) return;
    e.preventDefault();
    const rect = wrap.getBoundingClientRect();
    const isBefore = e.clientY < rect.top + rect.height / 2;
    document.querySelectorAll('.sec-card.drop-before,.sec-card.drop-after')
      .forEach(el => el.classList.remove('drop-before','drop-after'));
    wrap.classList.add(isBefore ? 'drop-before' : 'drop-after');
  });
  wrap.addEventListener('dragleave', e => {
    if (!wrap.contains(e.relatedTarget))
      wrap.classList.remove('drop-before','drop-after');
  });
  wrap.addEventListener('drop', e => {
    if (galDragPayload) return;
    e.preventDefault();
    const isBefore = wrap.classList.contains('drop-before');
    wrap.classList.remove('drop-before','drop-after');
    if (cardDragSrcIdx !== null && cardDragSrcIdx !== i) {
      pushUndo('섹션 순서 변경');
      const [mv] = sections.splice(cardDragSrcIdx, 1);
      let targetIdx = i;
      if (cardDragSrcIdx < i) targetIdx = i - 1;
      if (!isBefore) targetIdx += 1;
      sections.splice(Math.max(0, targetIdx), 0, mv);
      cardDragSrcIdx = null;
      renderAll(); toast('섹션 순서 변경됨');
    }
    cardDragSrcIdx = null;
  });

  return wrap;
}

// ═══════════════════════════════════════════
//  Gallery
// ═══════════════════════════════════════════
function buildGalleryHTML(images, secIdx) {
  const sec = sections[secIdx];
  const previewIdx = (previewState?.secIdx === secIdx) ? previewState.idx : -1;
  return images.map((img, n) => {
    const isSel = sec.selected?.has(n);
    const isPrev = n === previewIdx;
    return `<div class="gal-img${isSel?' gal-selected':''}${isPrev?' preview-active':''}" draggable="true"
        data-sec="${secIdx}" data-img="${n}">
      <img src="${escQ(img.src)}" loading="lazy" onerror="this.style.display='none'">
      <div class="gal-num">${n+1}</div>
      <div class="gal-check">✓</div>
    </div>`;
  }).join('');
}

function markInvalidImages(wrap, secIdx, invalidSrcs) {
  const set = new Set(invalidSrcs);
  wrap.querySelectorAll('.gal-img').forEach((el, n) => {
    const src = sections[secIdx].images[n]?.src;
    const bad = src && set.has(src);
    el.classList.toggle('gal-invalid', bad);
    el.querySelector('.gal-invalid-badge')?.remove();
    if (bad) {
      const badge = document.createElement('div');
      badge.className = 'gal-invalid-badge';
      badge.textContent = '!';
      el.appendChild(badge);
    }
  });
}

function bindGalleryEvents(wrap, secIdx) {
  wrap.querySelectorAll('.gal-img').forEach(el => {
    const imgIdx = +el.dataset.img;

    el.addEventListener('click', e => {
      e.stopPropagation();
      const sec = sections[secIdx];
      if (!sec.selected) sec.selected = new Set();

      if (e.shiftKey && lastClickedImg?.secIdx === secIdx) {
        // Shift: range select, no preview change
        const lo = Math.min(lastClickedImg.imgIdx, imgIdx);
        const hi = Math.max(lastClickedImg.imgIdx, imgIdx);
        if (!e.ctrlKey && !e.metaKey) sec.selected.clear();
        for (let k = lo; k <= hi; k++) sec.selected.add(k);
      } else if (e.ctrlKey || e.metaKey || e.altKey) {
        // Ctrl/Alt: toggle select, no preview change
        sec.selected.has(imgIdx) ? sec.selected.delete(imgIdx) : sec.selected.add(imgIdx);
      } else {
        // Plain click: single select + open/update preview
        sec.selected.clear(); sec.selected.add(imgIdx);
        previewOpen(secIdx, imgIdx, wrap);
      }
      lastClickedImg = { secIdx, imgIdx };
      refreshGalSelUI(wrap, secIdx);
    });

    el.addEventListener('dblclick', e => {
      e.stopPropagation();
      const urls = sections[secIdx].images.map(img => img.src);
      if (urls.length) lbOpen(urls, imgIdx);
    });

    el.addEventListener('dragstart', e => {
      e.stopPropagation();
      const sec = sections[secIdx];
      if (!sec.selected) sec.selected = new Set();
      let indices;
      if (sec.selected.has(imgIdx)) {
        indices = [...sec.selected].sort((a,b)=>a-b);
      } else {
        sec.selected.clear(); sec.selected.add(imgIdx); indices = [imgIdx];
        refreshGalSelUI(wrap, secIdx);
      }
      galDragPayload = { secIdx, indices };
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => indices.forEach(k => {
        wrap.querySelector(`.gal-img[data-img="${k}"]`)?.classList.add('gal-dragging-item');
      }), 0);
    });
    el.addEventListener('dragend', e => {
      e.stopPropagation();
      wrap.querySelectorAll('.gal-img')
        .forEach(el2 => el2.classList.remove('gal-dragging-item','gal-drop-before','gal-drop-after'));
      galDragPayload = null;
    });
    el.addEventListener('dragover', e => {
      if (!galDragPayload || galDragPayload.secIdx !== secIdx) return;
      e.preventDefault(); e.stopPropagation();
      wrap.querySelectorAll('.gal-img')
        .forEach(el2 => el2.classList.remove('gal-drop-before','gal-drop-after'));
      if (!galDragPayload.indices.includes(imgIdx)) {
        const rect = el.getBoundingClientRect();
        el.classList.add(e.clientX < rect.left + rect.width/2 ? 'gal-drop-before' : 'gal-drop-after');
      }
    });
    el.addEventListener('dragleave', e => {
      e.stopPropagation();
      el.classList.remove('gal-drop-before','gal-drop-after');
    });
    el.addEventListener('drop', e => {
      e.preventDefault(); e.stopPropagation();
      const isBefore = el.classList.contains('gal-drop-before');
      el.classList.remove('gal-drop-before','gal-drop-after');
      if (!galDragPayload || galDragPayload.secIdx !== secIdx) return;
      const { indices } = galDragPayload;
      if (indices.includes(imgIdx)) return;
      pushUndo('이미지 순서 변경');
      const imgs = sections[secIdx].images;
      const targetRef = imgs[imgIdx];
      const moved = indices.map(k => imgs[k]);
      const remaining = imgs.filter((_, k) => !indices.includes(k));
      let at = remaining.indexOf(targetRef);
      if (at < 0) at = remaining.length;
      if (!isBefore) at += 1;
      remaining.splice(Math.min(at, remaining.length), 0, ...moved);
      sections[secIdx].images = remaining;
      sections[secIdx].selected = new Set(Array.from({length:moved.length},(_,k)=>Math.min(at,remaining.length-moved.length)+k));
      galDragPayload = null;
      refreshGallery(wrap, secIdx);
      toast('이미지 순서 변경됨');
    });
  });
}

function refreshGallery(wrap, secIdx) {
  if (!wrap) return;
  const grid = wrap.querySelector('.gallery-grid');
  grid.innerHTML = buildGalleryHTML(sections[secIdx].images, secIdx);
  bindGalleryEvents(wrap, secIdx);
  refreshGalSelUI(wrap, secIdx);
  const firstSrc = sections[secIdx].images[0]?.src;
  const thumb = wrap.querySelector('.sec-thumb');
  if (thumb && firstSrc)
    thumb.innerHTML = `<img src="${escQ(firstSrc)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'>📷</div>'">`;
  const countEl = wrap.querySelector('.img-count');
  if (countEl) countEl.textContent = `${sections[secIdx].images.length}장`;
}

function refreshGalSelUI(wrap, secIdx) {
  const sec = sections[secIdx];
  if (!sec.selected) sec.selected = new Set();
  wrap.querySelectorAll('.gal-img').forEach(el =>
    el.classList.toggle('gal-selected', sec.selected.has(+el.dataset.img)));
  const toolbar = wrap.querySelector('.gallery-toolbar');
  const cnt = sec.selected.size;
  toolbar.style.display = cnt > 0 ? '' : 'none';
  if (cnt > 0) toolbar.querySelector('.sel-count').textContent = `${cnt}개 선택됨`;
}

function deleteSelectedImages(wrap, secIdx) {
  const sec = sections[secIdx];
  if (!sec.selected?.size) return;
  pushUndo(`이미지 ${sec.selected.size}장 삭제`);
  const ids = [...sec.selected];
  sec.images = sec.images.filter((_, k) => !ids.includes(k));
  sec.selected.clear(); lastClickedImg = null;
  refreshGallery(wrap, secIdx);
  toast(`${ids.length}장 삭제됨 (Ctrl+Z)`);
}

function clearGalSelection(wrap, secIdx) {
  if (sections[secIdx].selected) sections[secIdx].selected.clear();
  refreshGalSelUI(wrap, secIdx);
}

  });

}

// ═══════════════════════════════════════════
//  섹션 HTML 미리보기 (코드 패널용, validSet 없이)
// ═══════════════════════════════════════════
function buildSectionPreview(sec) {
  const BR5 = '\t<br>\n\t<br>\n\t<br>\n\t<br>\n\t<br>';
  const intro = isIntroSec(sec);
  let html = '';
  if (sec.isDetail) html += `\t<!--디테일-->\n\n`;
  else if (sec.headerComment) html += `\t<!--${sec.headerComment}-->\n`;

  if (sec.commented) {
    const blocks = sec.images.map(img => `\t<p style="text-align: center;"><img src="${img.src}"></p>\n${BR5}\n`).join('\n');
    html += '\t<!-- \n' + blocks + '\t -->\n';
  } else if (intro) {
    html += sec.images.map(img => `\t<p style="text-align: center;"><img src="${img.src}"></p>`).join('\n') + '\n';
    html += BR5 + '\n';
  } else {
    html += sec.images.map(img => `\t<p style="text-align: center;"><img src="${img.src}"></p>\n${BR5}\n`).join('\n');
  }
  return html;
}

// ═══════════════════════════════════════════
//  Generate — warning only, images NOT removed
// ═══════════════════════════════════════════
async function generateFinal() {
  const genBtn      = document.getElementById('gen-btn');
  const progressW   = document.getElementById('progress-wrap');
  const progressB   = document.getElementById('progress-bar');
  const progressLbl = document.getElementById('progress-label');
  const filterRes   = document.getElementById('filter-result');

  // Collect all active image URLs
  const allUrls = [];
  sections.forEach(sec => {
    if (!sec.commented) sec.images.forEach(img => allUrls.push(img.src));
  });
  if (!allUrls.length) { toast('활성화된 섹션에 이미지가 없어요'); return; }

  genBtn.disabled = true; genBtn.textContent = '이미지 확인 중...';
  progressW.style.display = 'block'; progressLbl.style.display = 'block';
  progressB.style.width = '0%'; filterRes.style.display = 'none';
  document.getElementById('output-wrap').style.display = 'none';

  const validSet = new Set(); const removed = []; let done = 0;
  await Promise.all(allUrls.map(async url => {
    const ok = await checkImg(url); done++;
    progressB.style.width = Math.round(done / allUrls.length * 100) + '%';
    progressLbl.textContent = `확인 중 ${done} / ${allUrls.length}`;
    if (ok) validSet.add(url);
    else removed.push(url.split('/').pop().split('?')[0]);
  }));

  if (validSet.size === 0 && allUrls.length > 0) {
    filterRes.className = 'filter-result err';
    filterRes.innerHTML = '<strong>⛔ 서버에 연결할 수 없습니다</strong><br>서버 날짜와 파일명을 다시 확인해 주세요.';
    filterRes.style.display = 'block';
    genBtn.disabled = false; genBtn.textContent = 'HTML 생성';
    progressW.style.display = 'none'; progressLbl.style.display = 'none';
    return;
  }

  // ── Warning only: mark invalid images in gallery, DO NOT delete ──
  const sectionCards = document.querySelectorAll('.sec-card');
  sections.forEach((sec, si) => {
    if (sec.commented) return;
    const card = sectionCards[si];
    if (!card) return;
    const invalidSrcs = sec.images.filter(img => !validSet.has(img.src)).map(img => img.src);
    const notice = card.querySelector('.gallery-removed');
    if (invalidSrcs.length) {
      openSections.add(sec.id);
      card.querySelector('.sec-gallery').classList.add('open');
      card.querySelector('[data-arrow]')?.classList.add('open');
      markInvalidImages(card, si, invalidSrcs);
      notice.style.display = 'block';
      notice.innerHTML = `<strong>⚠ ${invalidSrcs.length}개 이미지가 서버에 없습니다 (HTML 생성 시 자동 제외)</strong><br>` +
        invalidSrcs.map(s => `· ${s.split('/').pop()}`).join('<br>');
    } else {
      notice.style.display = 'none';
      markInvalidImages(card, si, []);
    }
  });

  filterRes.className = removed.length ? 'filter-result warn' : 'filter-result ok';
  filterRes.innerHTML = removed.length
    ? `<strong>⚠ ${removed.length}개 이미지가 서버에 없어 HTML에서 제외됩니다</strong><br>` +
      removed.map(f => `· ${f}`).join('<br>')
    : `<strong>✓ 전체 ${allUrls.length}개 이미지 확인 완료</strong>`;
  filterRes.style.display = 'block';

  // ── Build output HTML ──
  const BR5 = '\t<br>\n\t<br>\n\t<br>\n\t<br>\n\t<br>';

  // Intro keywords: sections whose name matches these get no <br> between images
  const isIntro = sec => isIntroSec(sec);

  // ── Normalize header (rule 1: always 5 br at the very top) ──
  let normalizedHeader = '';
  const divMatch = headerHtml.match(/<div[^>]*style="text-align:\s*center;?"[^>]*>/i);
  if (divMatch) {
    const beforeDiv = headerHtml.slice(0, divMatch.index);
    const afterDiv  = headerHtml.slice(divMatch.index + divMatch[0].length);
    // Preserve header-level comments (e.g. <!--상세-->)
    const cmts = [];
    const cmtRe = /<!--([^<>]{1,80}?)-->/g;
    let m;
    while ((m = cmtRe.exec(afterDiv)) !== null) {
      const t = m[1].trim();
      if (t && !/^-/.test(t)) cmts.push(t);
    }
    normalizedHeader = beforeDiv + divMatch[0] + '\n';
    for (const c of cmts) normalizedHeader += `\t<!--${c}-->\n`;
    normalizedHeader += '\n' + BR5 + '\n'; // rule 1: always 5 br
  } else {
    normalizedHeader = headerHtml;
  }

  let html = normalizedHeader;

  for (let si = 0; si < sections.length; si++) {
    const sec = sections[si];

    // User-edited raw code override → use as-is
    if (secRawCode.has(sec.id) && !sec.commented) {
      html += '\n\n' + secRawCode.get(sec.id);
      continue;
    }

    const intro = !sec.isDetail && !sec.commented && isIntro(sec);

    html += '\n\n';
    // Section label comment
    if (sec.isDetail) {
      html += `\t<!--디테일-->\n\n`;
    } else if (sec.headerComment) {
      html += `\t<!--${sec.headerComment}-->\n`;
    }

    const validImgs = sec.images.filter(img => sec.commented || validSet.has(img.src));

    if (sec.commented) {
      // Commented-out (엎어진) section — block comment, each img has BR5 inside
      const blocks = validImgs
        .map(img => `\t<p style="text-align: center;"><img src="${img.src}"></p>\n${BR5}\n`)
        .join('\n');
      html += '\t<!-- \n' + blocks + '\t -->\n';

    } else if (intro) {
      // Rule 3: intro section — NO <br> between images
      html += validImgs
        .map(img => `\t<p style="text-align: center;"><img src="${img.src}"></p>`)
        .join('\n') + '\n';
      // Rule 2: 5 br after intro (= before first regular section)
      html += BR5 + '\n';

    } else {
      // Regular section — each image followed by BR5
      html += validImgs
        .map(img => `\t<p style="text-align: center;"><img src="${img.src}"></p>\n${BR5}\n`)
        .join('\n');
    }
  }

  html += '\n\n' + footerHtml;

  document.getElementById('out-html').value = html;
  const totalImgs = sections.reduce((s, sec) => s + (sec.commented ? 0 : sec.images.length), 0);
  const on  = sections.filter(s => !s.commented).length;
  const off = sections.filter(s =>  s.commented).length;
  document.getElementById('out-meta').textContent =
    `활성 ${on}섹션 · 주석 ${off}섹션 · 이미지 ${totalImgs}장`;

  document.getElementById('output-wrap').style.display = '';
  document.getElementById('copy-btn').textContent = '클립보드에 복사';
  document.getElementById('copy-btn').classList.remove('copied');
  genBtn.disabled = false; genBtn.textContent = 'HTML 생성';
  progressW.style.display = 'none'; progressLbl.style.display = 'none';
  document.getElementById('output-wrap').scrollIntoView({ behavior:'smooth', block:'start' });
}

function copyOutput() {
  const text = document.getElementById('out-html').value;
  const btn  = document.getElementById('copy-btn');
  const done = () => {
    btn.textContent = '복사 완료 ✓'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '클립보드에 복사'; btn.classList.remove('copied'); }, 2500);
  };
  if (navigator.clipboard?.writeText) navigator.clipboard.writeText(text).then(done).catch(fb);
  else fb();
  function fb() {
    const ta = document.getElementById('out-html');
    ta.select(); ta.setSelectionRange(0,99999);
    try { document.execCommand('copy'); done(); } catch { toast('복사 실패 — 직접 선택해 주세요'); }
  }
}
</script>
</body>
</html>
